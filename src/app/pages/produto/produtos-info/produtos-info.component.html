<form [formGroup]="formProduto">
  <p-card>
    <div class="p-col-12 p-md-12 p-d-flex p-jc-start">
      <h5>Cadastro de Produtos</h5>
    </div>

    <input type="text" formControlName="id" hidden />

    <div class="p-grid p-fluid">
      <div class="p-col-12 p-md-4 p-d-flex p-flex-column p-jc-center">
        <p-float-label>
          <input id="nome_produto" type="text" pInputText formControlName="nome"
            [ngClass]="{'ng-dirty': nome?.invalid && (nome?.dirty || nome?.touched)}" [maxLength]="30">
            <label for="nome_produto">Nome do produto</label>
          </p-float-label>
          @if (nome?.invalid && (nome?.dirty || nome?.touched)) {
            <small class="p-error">Informe o nome do
            produto.</small>
          }
        </div>

        <div class="p-col-12 p-md-3 p-d-flex p-flex-column p-jc-center">
          <p-float-label>
            <p-inputnumber id="preco_produto" mode="currency" currency="BRL" locale="pt-BR" formControlName="preco">
            </p-inputnumber>
            <label for="preco_produto">Preço</label>
          </p-float-label>
        </div>

        <div class="p-col-12 p-md-2 p-d-flex p-ai-center">
          <p-checkbox name="produto_ativo" [binary]="true" inputId="produto_ativo" formControlName="ativo"></p-checkbox>
          <label for="produto_ativo" class="p-ml-2">Ativo</label>
        </div>
      </div>
      <ng-template #footer>
        <div class="p-grid p-nogutter p-justify-between">
          <p-button label="Cancelar" (onClick)="cancel()" icon="pi pi-times" styleClass="p-button-danger"></p-button>
          <p-button label="Avançar" (onClick)="nextPage()" icon="pi pi-angle-right" iconPos="right"></p-button>
        </div>
      </ng-template>
    </p-card>
  </form>
